apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-config
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/dev/gateway-api
  prune: true
  dependsOn:
    - name: gateway-api-crds
    - name: envoy-gateway
  timeout: 5m
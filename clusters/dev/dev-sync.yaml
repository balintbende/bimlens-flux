##
## This kustomization maps the /apps/dev folder as the place for
## scanning for image automation changes. Id est: where the actual helm releases
## and images are set.
##
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bimlens-dev
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./apps/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: bimlens-helm-repository-dev

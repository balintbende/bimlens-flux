---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: api-dev-image-repository
  namespace: flux-system
spec:
  image: ghcr.io/balintbende/bimlens-api
  interval: 5m0s
  secretRef:
    name: ghcr-pull-credentials
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: web-dev-image-repository
  namespace: flux-system
spec:
  image: bimlens.azurecr.io/web
  interval: 5m0s
  secretRef:
    name: acr-pull-credentials
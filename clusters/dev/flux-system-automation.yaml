##
## The `ImageUpdateAutomation` takes the `flux-repo` kustomization
## and using the image policies pulls the latest image from the image repos.
##
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: flux-system-development
  namespace: flux-system
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: bimlens-flux-repository-dev
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: balint.bend@gmail.com
        name: fluxcdbot
      messageTemplate: |
        Flux: Automated image update

        Automation name: {{ .AutomationObject }}

        Files:
        {{ range $filename, $_ := .Updated.Files -}}
        - {{ $filename }}
        {{ end -}}

        Objects:
        {{ range $resource, $_ := .Updated.Objects -}}
        - {{ $resource.Kind }} {{ $resource.Name }}
        {{ end -}}

        Images:
        {{ range .Updated.Images -}}
        - {{.}}
        {{ end -}}
    push:
      branch: main

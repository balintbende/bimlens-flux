metadata:
  name: web-dev-image-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: web-dev-image-repository
  filterTags:
    pattern: '^develop-[a-f0-9]+-(?P<ts>[0-9]+)'
    extract: '$ts'
  policy:
    numerical:
      order: asc